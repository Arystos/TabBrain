<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
  <style>
    body { width: 380px; }
    .setting-group { margin-bottom: 16px; }
    .setting-group h3 { font-size: 13px; margin-bottom: 8px; color: #2d3748; }
    .setting-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 6px 0; font-size: 12px;
    }
    label { color: #4a5568; }
    input[type="number"] {
      width: 60px; padding: 4px 8px; border: 1px solid #e2e6ea;
      border-radius: 6px; font-size: 12px; text-align: center;
    }
    .toggle { position: relative; width: 36px; height: 20px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle .slider {
      position: absolute; inset: 0; background: #cbd5e0; border-radius: 20px;
      cursor: pointer; transition: 0.2s;
    }
    .toggle .slider::before {
      content: ""; position: absolute; height: 14px; width: 14px;
      left: 3px; bottom: 3px; background: white; border-radius: 50%;
      transition: 0.2s;
    }
    .toggle input:checked + .slider { background: #48bb78; }
    .toggle input:checked + .slider::before { transform: translateX(16px); }
    .btn-row { display: flex; gap: 8px; margin-top: 12px; }
    .back-link { display: block; margin-bottom: 12px; font-size: 12px; color: #4299e1; cursor: pointer; background: none; border: none; }
  </style>
</head>
<body>
  <div id="app">
    <button class="back-link" id="btn-back">&larr; Back</button>

    <div class="setting-group">
      <h3>Auto-Close</h3>
      <div class="setting-row">
        <label>Auto-close duplicates</label>
        <label class="toggle"><input type="checkbox" id="set-auto-dups" checked><span class="slider"></span></label>
      </div>
      <div class="setting-row">
        <label>Auto-close stale tabs</label>
        <label class="toggle"><input type="checkbox" id="set-auto-stale" checked><span class="slider"></span></label>
      </div>
      <div class="setting-row">
        <label>Stale threshold (days)</label>
        <input type="number" id="set-stale-days" value="3" min="1" max="30">
      </div>
      <div class="setting-row">
        <label>Show notifications</label>
        <label class="toggle"><input type="checkbox" id="set-notifications"><span class="slider"></span></label>
      </div>
    </div>

    <div class="setting-group">
      <h3>Classification</h3>
      <div class="setting-row">
        <label>Active threshold (minutes)</label>
        <input type="number" id="set-active-mins" value="60" min="5" max="1440">
      </div>
      <div class="setting-row">
        <label>Save-for-later max focus (seconds)</label>
        <input type="number" id="set-savelater-secs" value="10" min="1" max="120">
      </div>
    </div>

    <div class="setting-group">
      <h3>Clustering</h3>
      <div class="setting-row">
        <label>Similarity threshold (0.1 - 0.5)</label>
        <input type="number" id="set-cluster-threshold" value="0.25" min="0.1" max="0.5" step="0.05">
      </div>
    </div>

    <div class="setting-group">
      <h3>Excluded Domains</h3>
      <p style="font-size:11px;color:#718096;margin-bottom:6px;">Tabs on these domains will never be auto-closed (one per line):</p>
      <textarea id="set-excluded" rows="4" style="width:100%;padding:6px;border:1px solid #e2e6ea;border-radius:6px;font-size:11px;resize:vertical;"></textarea>
    </div>

    <div class="btn-row">
      <button id="btn-save" class="action-btn">Save settings</button>
      <button id="btn-reset" class="action-btn secondary">Reset defaults</button>
    </div>
  </div>
  <script src="settings.js"></script>
</body>
</html>
