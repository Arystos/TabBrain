<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="../popup/themes.css">
  <link rel="stylesheet" href="../popup/popup.css">
</head>
<body class="sidebar">
  <div id="app">
    <!-- Stats Bar -->
    <header id="stats-bar">
      <div class="stats-left">
        <span id="total-count" class="stat-pill">0 tabs</span>
        <span id="dup-count" class="stat-pill dup">0 duplicates</span>
        <span id="stale-count" class="stat-pill stale">0 stale</span>
        <span id="topic-count" class="stat-pill topic">0 topics</span>
      </div>
      <div class="stats-right">
        <button id="btn-close-dups" class="action-btn" title="Close all duplicates">Close dups</button>
        <button id="btn-close-stale" class="action-btn" title="Close all stale tabs">Close stale</button>
        <button id="btn-pin" class="action-btn secondary" title="Pinned: sidebar stays open on tab click">&#128204;</button>
        <button id="btn-settings" class="action-btn secondary" title="Settings">&#9881;</button>
      </div>
    </header>

    <!-- Search -->
    <div id="search-bar">
      <input type="text" id="search-input" placeholder="Search tabs..." />
    </div>

    <!-- View Mode Toggle -->
    <div id="view-mode">
      <button class="view-btn active" data-view="topic">By Topic</button>
      <button class="view-btn" data-view="window">By Window</button>
      <button class="view-btn" data-view="container">By Container</button>
    </div>

    <!-- Topic Groups -->
    <div id="groups-container"></div>

    <!-- Snoozed Tabs -->
    <details id="snooze-section">
      <summary>Snoozed (<span id="snooze-count">0</span>)</summary>
      <div id="snooze-list"></div>
    </details>

    <!-- Rescue List -->
    <details id="rescue-section">
      <summary>Rescue List (<span id="rescue-count">0</span>)</summary>
      <div id="rescue-list"></div>
      <div id="rescue-actions">
        <button id="btn-clear-rescue" class="action-btn danger">Clear all</button>
      </div>
    </details>

  </div>
  <script src="../popup/popup.js"></script>
</body>
</html>
